[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"


[project]
name = "cordless"
version = "1.0.0rc2"
description = "Serverless Discord interactions framework for AWS Lambda"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

authors = [
  { name = "borhara" }
]

classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent"
]


[project.urls]
Homepage = "https://cordless.dev"
Documentation = "https://cordless.dev"
Repository = "https://github.com/borhara/cordless"


[project.scripts]
cordless = "cordless.cli:main"


[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pynacl>=1.5",
  "moto[iam,awslambda,apigatewayv2,events,logs,s3]>=5.0",
  "boto3>=1.20",
  "botocore[crt]",
]
deploy = [
  "boto3>=1.20",
  "botocore[crt]",
]


[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]


[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
